name: New MCP server
version: 0.0.1
schema: v1
mcpServers:
  - name: playwrite
    command: npx
    args:
      - "@playwright/mcp@latest"
  - name: mb-mcp
    command: npx
    args:
      - "@neko0721/memory-bank-mcp"
  - name: SQLite MCP
    command: npx
    args:
      - "-y"
      - "mcp-sqlite"
      - "/path/to/your/database.db"
    env: {}
